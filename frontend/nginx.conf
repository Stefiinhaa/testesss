server {
    listen 80;
    server_name _;
    server_tokens off;
    resolver ${NGINX_DNS_RESOLVER} valid=${NGINX_DNS_VALID_SECONDS}s ipv6=off;
    client_max_body_size 5m;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Infra requires 2xx during frontend bootstrap. Force fresh 200 responses
    # for service worker bootstrap assets instead of conditional 304 replies.
    location = /sw.js {
        etag off;
        if_modified_since off;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    location ~* ^/workbox-.*\.js$ {
        etag off;
        if_modified_since off;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    # Always revalidate app shell and manifest to avoid stale SPA/PWA bootstrap
    # after deploys (especially across different local ports/origins).
    location = /index.html {
        etag off;
        if_modified_since off;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        etag off;
        if_modified_since off;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    location ~* ^/(assets/.*|.*\.(js|css|svg|ico|png|json|webmanifest))$ {
        try_files $uri =404;
    }

    location @spa {
        try_files /index.html =404;
    }

    location = /login {
        error_page 418 = @spa;
        if ($request_method != POST) {
            return 418;
        }
        proxy_pass ${AUTH_PROXY_SCHEME}://${AUTH_PROXY_UPSTREAM}/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location = /logout {
        error_page 418 = @spa;
        if ($request_method != POST) {
            return 418;
        }
        proxy_pass ${AUTH_PROXY_SCHEME}://${AUTH_PROXY_UPSTREAM}/logout;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location = /token {
        proxy_pass ${AUTH_PROXY_SCHEME}://${AUTH_PROXY_UPSTREAM}/token;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location = /esqueci-senha {
        proxy_pass ${AUTH_PROXY_SCHEME}://${AUTH_PROXY_UPSTREAM}/esqueci-senha;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location = /reset-senha {
        proxy_pass ${AUTH_PROXY_SCHEME}://${AUTH_PROXY_UPSTREAM}/reset-senha;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /auth/ {
        rewrite ^/auth/(.*) /$1 break;
        proxy_pass ${AUTH_PROXY_SCHEME}://${AUTH_PROXY_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass ${API_PROXY_SCHEME}://${API_PROXY_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
