<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ef4f8b">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/full-educa-icone.svg">
    <link rel="apple-touch-icon" href="/full-educa-icone.svg">
    <title>Redefinir senha - FullEduca</title>
    <link rel="stylesheet" type="text/css" href="toastify.css">
    <link rel="stylesheet" type="text/css" href="style.css">
        <script type="module" src="reset-password.js"></script>
        <!-- Observações:
                 - Esta página consome `token` na query string (ex: ?token=...).
                 - Validações finais são tratadas no servidor; aqui há validações
                     UX (min length, confirmação, limite 72 bytes).
        -->
</head>
<body class="auth-body">
    <div class="login-container">
        <form class="reset-form">
            <h2>Escolha uma nova senha</h2>
            <div class="input-group">
                <label for="reset-token">Token de redefinição</label>
                <input type="text" id="reset-token" name="token" required autocomplete="one-time-code">
            </div>
            <div class="input-group">
                <label for="new-password">Nova senha</label>
                <input type="password" id="new-password" name="senha" required autocomplete="new-password">
            </div>
            <div class="input-group">
                <label for="new-password-confirm">Confirmar senha</label>
                <input type="password" id="new-password-confirm" required autocomplete="new-password">
            </div>
            <button type="submit">Redefinir senha</button>
            <div data-feedback class="form-feedback" aria-live="polite"></div>
            <noscript>
                <div class="form-feedback is-visible is-error">Sem JavaScript, copie o token recebido no e-mail para o campo acima e reative o JavaScript apenas neste domínio oficial para concluir o envio.</div>
            </noscript>
            <div class="back-to-login auth-secondary-action">
                <a class="btn auth-secondary-btn" href="/login">Voltar para o login</a>
            </div>
        </form>
    </div>
</body>
</html>
