<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ef4f8b">
    <title>Recuperar senha - FullEduca</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/full-educa-icone.svg">
    <link rel="apple-touch-icon" href="/full-educa-icone.svg">
    <link rel="stylesheet" type="text/css" href="toastify.css">
    <link rel="stylesheet" type="text/css" href="style.css">

    <script type="module" src="forgot-password.js"></script>
</head>
<body class="auth-body">
    <div class="login-container">
        <form class="forgot-form">
            <h2>Recuperar senha</h2>
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="username">
            </div>
            <button type="submit">Enviar link</button>
            <div data-feedback class="form-feedback" aria-live="polite"></div>
            <noscript>
                <div class="form-feedback is-visible is-error">Esta página depende de JavaScript para enviar a solicitação com resposta neutra. Habilite-o apenas neste domínio oficial.</div>
            </noscript>
            <div class="login-link auth-secondary-action">
                <a class="btn auth-secondary-btn" href="/login">Voltar ao login</a>
            </div>
        </form>
    </div>
</body>
</html>
